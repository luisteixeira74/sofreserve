<!--
Template: confirm.html

Responsabilidade:
Renderizar o resultado da confirmação de uma reserva.

Importante:
- NÃO usar status do domínio diretamente (ex: confirmed)
- A mensagem exibida vem do handler via campo .Message
- Este template é apenas apresentação (sem regra de negócio)
-->
<!doctype html>
<html>
  <head>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-6 rounded-2xl shadow-lg w-96 text-center">
      <h1 class="text-xl font-bold mb-4">✅ Reserva</h1>

      <h2 class="text-xl font-bold mb-4 text-green-600">{{.Message}}</h2>

      <p class="text-gray-700">Nome: <strong>{{.Name}}</strong></p>

      <p class="text-gray-700">Email: <strong>{{.Email}}</strong></p>

      <p class="text-gray-700 mb-4">
        Quantidade: <strong>{{.Quantity}}</strong>
      </p>

      <a
        href="/evento?id={{.EventID}}"
        class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700"
      >
        Ver evento
      </a>

      <a
        href="/cancel?token={{.Token}}"
        class="mt-3 inline-block text-red-600 hover:underline"
      >
        Cancelar reserva
      </a>
    </div>
  </body>
</html>

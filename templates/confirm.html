<!doctype html>
<html>
  <head>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-6 rounded-2xl shadow-lg w-96 text-center">
      <h1 class="text-xl font-bold mb-4">✅ Reserva {{.Status}}</h1>

      <p class="text-gray-700">Nome: <strong>{{.Name}}</strong></p>

      <p class="text-gray-700">Email: <strong>{{.Email}}</strong></p>

      <p class="text-gray-700 mb-4">
        Quantidade: <strong>{{.Quantity}}</strong>
      </p>

      <a
        href="/evento?id={{.EventID}}"
        class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700"
      >
        Ver evento
      </a>
    </div>
  </body>
</html>

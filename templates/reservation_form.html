{{define "reservation_form"}}

<div class="terminal-card">
  <div class="terminal-header">{{.Title}}</div>

  <div class="terminal-body">
    <div class="terminal-subheader">Faça abaixo sua reserva para o evento</div>

    <p class="muted">
      <span class="prompt">&gt;</span>
      Evento: <strong>{{.Data.EventName}}</strong>
    </p>

    {{if .Data.Error}}
    <p class="error"><span class="prompt">&gt;</span> ERRO: {{.Data.Error}}</p>
    <br />
    {{end}}

    <form method="POST" action="/events/reserve" class="form">
      <input type="hidden" name="event_id" value="{{.Data.EventID}}" />

      <div class="field">
        <span class="prompt">&gt;</span>
        <span class="label">Nome:</span>
        <input
          type="text"
          name="name"
          placeholder="Seu nome"
          value="{{.Data.Name}}"
        />
      </div>

      <div class="field">
        <span class="prompt">&gt;</span>
        <span class="label">Email:</span>
        <input
          type="email"
          name="email"
          placeholder="seu@email.com"
          value="{{.Data.Email}}"
        />
      </div>

      <div class="field">
        <span class="prompt">&gt;</span>
        <span class="label">Quantidade:</span>
        <input
          type="number"
          name="quantity"
          min="1"
          max="10"
          step="1"
          value="{{if gt .Data.Quantity 0}}{{.Data.Quantity}}{{else}}1{{end}}"
        />
      </div>

      <br />

      <button type="submit" class="btn-terminal" data-loading="true">
        [ CONFIRMAR RESERVA ]
      </button>
    </form>
  </div>
</div>

{{end}}

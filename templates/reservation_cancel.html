{{ define "reservation_cancel" }}
<div class="terminal-card">
  <div class="terminal-header">Reserva cancelada • SofReserve</div>

  <div class="terminal-body">
    <p>> Reserva cancelada com sucesso.</p>
    <p class="muted">
      Lamentamos que você tenha cancelado sua reserva para {{.EventName}}.
    </p>
    {{ if .Message }}
    <p class="text-red-600">{{.Message}}</p>
    {{ end }}
  </div>
</div>
{{ end }}
